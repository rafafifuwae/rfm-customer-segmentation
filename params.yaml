# Parameter eksperimen untuk pipeline RFM + K-Means
# Diparse oleh DVC dan/atau notebook untuk reproducibility.

random_state: 42

preprocessing:
  status_filter: "delivered"
  winsorize_upper: 0.99
  winsorize_lower: 0.0
  use_log_transform:
    monetary: true
    frequency: true

rfm:
  features: ["Recency_w", "Frequency_log", "Monetary_log"]
  scoring_quintiles: 5

kmeans:
  k_range: [2, 3, 4, 5, 6, 7, 8, 9, 10]
  k_optimal: 4
  n_init: 20
  max_iter: 300

paths:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  models_dir: models
  reports_dir: reports
  figures_dir: reports/figures
